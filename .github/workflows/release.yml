name: Release

on:
  push:
    tags:
      - 'v*'

# Upload-artifact@v5 still declares a Node 20 runtime; opt all JavaScript
# actions into Node 24 ahead of the 2026-06-16 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# --- NuGet Trusted Publishing (OIDC, no long-lived API key) ---
# The publish-nuget job below pushes every packable FalkForge project to nuget.org
# using Trusted Publishing instead of a stored NUGET_API_KEY secret: the job requests
# a short-lived GitHub OIDC token (permissions.id-token: write), exchanges it for a
# temporary nuget.org API key (NuGet/login@v1, ~1 hour lifetime, one OIDC token yields
# exactly one temp key), then pushes packages with that key. No nuget.org API key is
# stored anywhere in this repo or its secrets.
#
# One-time setup on nuget.org (account menu -> Trusted Publishing -> Add policy):
#   Repository Owner : Falkesand
#   Repository        : FalkForge
#   Workflow File     : release.yml    (file name only, not the .github/workflows/ path)
#   Environment       : nuget-publish  (must match the `environment:` gate on the job below)
# The policy applies to every package owned by the selected nuget.org account/org.
# As of 2026-07, nuget.org Trusted Publishing policies are NOT scoped to a specific
# package ID -- there is no glob/ID field in policy setup (confirmed: policy fields are
# Repository Owner / Repository / Workflow File / Environment only; per-package scoping
# is an open feature request, see https://github.com/nuget/nugetgallery/issues/10587).
#
# FIRST-EVER PUBLISH OF A BRAND-NEW PACKAGE ID: no special bootstrap is required. Because
# the policy is owner-scoped rather than package-ID-scoped, the temporary API key behaves
# like a normal owner-level nuget.org API key and can push a package ID that has never
# existed before exactly the same way it pushes an existing ID -- nuget.org's docs do not
# describe any different first-publish path for Trusted Publishing, and the pending-policy
# mechanics below are about the GITHUB REPO's trust, not about individual package IDs. No
# one-time manual `dotnet nuget push` with a classic API key is needed to "seed" new IDs;
# if that ever changes, do the one-time seed push locally with a classic key from
# nuget.org -> API Keys, then this workflow takes over for every release after.
#
# PRIVATE-REPO POLICY ACTIVATION: FalkForge is a private repo (as of 2026-07). Per
# nuget.org's docs, a Trusted Publishing policy created against a private repo starts
# "temporarily active for 7 days" -- nuget.org needs the repo/owner IDs from a first
# successful OIDC exchange to permanently pin the policy (this defends against resurrection
# attacks: deleting a repo and recreating it under the same name to impersonate the trust
# relationship). If no publish happens within 7 days of creating the policy, it goes
# inactive and must be restarted on nuget.org before the publish-nuget job below will
# authenticate again -- that failure surfaces as an auth error in the NuGet login step,
# not a build or test failure.
#
# GitHub-side one-time setup (outside this file):
#   - Repo Settings -> Environments -> new environment named "nuget-publish". Add required
#     reviewers there for a human approval gate before every nuget.org publish (recommended
#     once this package has a broad audience); leave reviewer-free for unattended releases.
#   - Repo Settings -> Secrets and variables -> Actions -> new secret NUGET_USER = the
#     nuget.org account/profile username (NOT email) that owns the Trusted Publishing
#     policy above. This is the only nuget.org-related secret this workflow uses -- no
#     API key secret exists.
#
# Sources (fetched 2026-07, do not trust training-data memory for this recent feature):
#   https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing  (policy fields,
#     GitHub Actions example, "Policies Pending Full Activation" 7-day private-repo window)
#   https://github.com/NuGet/login  (action inputs: `user` required; outputs: `NUGET_API_KEY`;
#     default OIDC audience https://www.nuget.org; latest tag v1.2.0 as of 2026-04)
#   https://github.com/nuget/nugetgallery/issues/10587  (confirms no per-package-ID scoping
#     exists yet in Trusted Publishing policies)

jobs:
  release:
    runs-on: windows-latest

    permissions:
      id-token: write       # required for OIDC token used by attest-build-provenance
      contents: write       # required to create the GitHub Release and upload assets
      attestations: write   # required to write build provenance attestations

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FalkForge.slnx

      - name: Build (Release)
        run: dotnet build FalkForge.slnx --no-restore -c Release

      # Full test suite must be green before any release artifact is published.
      # A test failure here aborts the workflow — no release is created.
      # FALKFORGE_E2E=1 opts the release run into the heavyweight e2e tests that the
      # fresh-clone default skips (see tests/FalkForge.Integration.Tests/E2EGate.cs).
      #
      # The trx is produced by the Microsoft.Testing.Platform native TRX reporter (arguments
      # after `--` are passed to the test host), NOT the classic VSTest `--logger trx`, which is
      # a silent no-op under MTP (xunit.v3) — the old form here left a red release run with zero
      # way to name which test failed (discovered while diagnosing a release run that failed with
      # 8 tests never seen in a local run: without a trx or an uploaded artifact, the only signal
      # was a per-assembly pass/fail count in the -v minimal console log). Mirrors ci.yml's
      # working pattern. Each test project writes its own test-results.trx under its
      # bin/<cfg>/<tfm>/TestResults folder, captured by the artifact upload below.
      - name: Test (full suite)
        env:
          FALKFORGE_E2E: '1'
        run: dotnet test FalkForge.slnx --no-build -c Release -v minimal -- --report-trx --report-trx-filename test-results.trx

      # Preserve per-test failure detail even when the Test step above fails the job — a red
      # release run must be diagnosable from the Actions UI alone, without needing local
      # reproduction of the exact CI environment (elevation, absent tools, OS image contents).
      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: release-test-results
          path: tests/**/bin/**/TestResults/**
          if-no-files-found: warn

      # --- Publish NativeAOT artifacts ---
      # Engine and Elevation require a RID for NativeAOT compilation.
      # win-x64 is the only supported target for Windows MSI P/Invoke.

      - name: Publish Engine (NativeAOT, win-x64)
        run: >
          dotnet publish src/FalkForge.Engine/FalkForge.Engine.csproj
          -c Release -r win-x64 --self-contained
          -o release-artifacts/engine

      - name: Publish Engine.Elevation (NativeAOT, win-x64)
        run: >
          dotnet publish src/FalkForge.Engine.Elevation/FalkForge.Engine.Elevation.csproj
          -c Release -r win-x64 -f net10.0-windows --self-contained
          -o release-artifacts/elevation

      # Cli is a standard managed exe (no NativeAOT); publish as self-contained win-x64
      # so it ships without requiring .NET on the target machine.
      - name: Publish CLI (self-contained, win-x64)
        run: >
          dotnet publish src/FalkForge.Cli/FalkForge.Cli.csproj
          -c Release -r win-x64 --self-contained
          -o release-artifacts/cli

      # --- Pack documentation site ---
      # Same HTML-only surface published to GitHub Pages (see .github/workflows/pages.yml):
      # documentation.html (+ index.html copy) and docs/tutorials/*.html. Attached to the
      # release so the manual is available offline without cloning the repo.

      - name: Pack documentation site
        shell: pwsh
        run: ./scripts/pack-docs.ps1 -Output release-artifacts/docs-pack

      # --- Collect and checksum ---

      - name: Collect release artifacts
        shell: pwsh
        run: |
          $out = "release-artifacts/dist"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Engine exe
          Copy-Item "release-artifacts/engine/FalkForge.Engine.exe"           "$out/FalkForge.Engine.exe"
          # Elevation exe
          Copy-Item "release-artifacts/elevation/FalkForge.Engine.Elevation.exe" "$out/FalkForge.Engine.Elevation.exe"
          # CLI exe (assembly is FalkForge.Cli.exe; distributed as forge.exe to match the tool command name)
          Copy-Item "release-artifacts/cli/FalkForge.Cli.exe"                  "$out/forge.exe"
          # Documentation zip (see scripts/pack-docs.ps1)
          $docsZip = Get-ChildItem "release-artifacts/docs-pack" -Filter "falkforge-docs-*.zip" | Select-Object -First 1
          Copy-Item $docsZip.FullName "$out/$($docsZip.Name)"

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $distDir = "release-artifacts/dist"
          $checksumFile = "$distDir/SHA256SUMS.txt"
          $lines = Get-ChildItem -Path $distDir -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)"
            }
          $lines | Set-Content -Path $checksumFile -Encoding UTF8
          Write-Host "Checksums written to $checksumFile"
          $lines | ForEach-Object { Write-Host $_ }

      # --- SLSA-style build provenance attestation ---
      # Attests that the artifacts were produced by this exact workflow run.
      # Verification: gh attestation verify <file> --repo Falkesand/FalkForge
      #
      # NOTE: continue-on-error: true — GitHub build provenance attestations require
      # the repository to be on a paid plan when running on private repos with
      # GitHub-hosted runners. Until this repo is public (or plan confirmed), the
      # attestation step is best-effort and will not block the release on failure.
      # A warning step below makes any failure visible in the workflow summary.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: |
            release-artifacts/dist/FalkForge.Engine.exe
            release-artifacts/dist/FalkForge.Engine.Elevation.exe
            release-artifacts/dist/forge.exe
            release-artifacts/dist/SHA256SUMS.txt

      - name: Warn if attestation skipped or failed
        if: steps.attest.outcome != 'success'
        shell: pwsh
        run: |
          Write-Host "::warning::Build provenance attestation did not complete (outcome: ${{ steps.attest.outcome }})."
          Write-Host "::warning::Possible causes: private repo on free plan, OIDC token unavailable, or transient API error."
          Write-Host "::warning::Artifacts are still released. Re-run after confirming plan support or making the repo public."

      # --- Publish GitHub Release ---
      # Uses the gh CLI (pre-installed on windows-latest) rather than a third-party
      # release action to minimize the dependency surface.

      - name: Create GitHub Release and upload artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = "release-artifacts/dist"

          # Collect file paths for upload
          $files = Get-ChildItem -Path $distDir -File | ForEach-Object { $_.FullName }

          gh release create $tag `
            --repo "${{ github.repository }}" `
            --title "FalkForge $tag" `
            --generate-notes `
            $files

          Write-Host "Release $tag created with $($files.Count) artifact(s)."

  # --- Publish NuGet packages via Trusted Publishing ---
  # See the workflow-level header comment above `jobs:` for the full policy setup,
  # first-publish, and private-repo-activation notes.
  #
  # Runs as its own job (rather than steps tacked onto `release`) so the `environment:`
  # gate gives it an independent approval checkpoint from the GitHub Release creation, and
  # so `permissions.id-token: write` is scoped to only the job that actually needs OIDC —
  # the `release` job's existing `id-token: write` is for actions/attest-build-provenance
  # and is untouched by this change.
  #
  # `needs: release` gates the publish on the full build+test+release pipeline succeeding
  # first; this workflow only ever triggers on `v*` tag pushes (see `on:` above), so no
  # extra trigger condition is needed here.
  publish-nuget:
    name: Publish NuGet packages (Trusted Publishing)
    needs: release
    runs-on: windows-latest
    environment: nuget-publish

    permissions:
      id-token: write   # required for the OIDC token NuGet/login exchanges for a temp API key
      contents: read    # checkout only; this job does not modify repo contents

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Packs all 29 packable FalkForge projects (Core, both compilers, extensions,
      # plugins, Sdk, the FalkForge meta-package, the FalkForge.Templates template pack,
      # and the forge CLI as a .NET global tool) into artifacts/nuget/*.nupkg. Internally
      # publishes the NativeAOT engine + elevation companion first so
      # FalkForge.Engine.Runtime.win-x64 ships real win-x64 binaries (see scripts/pack.ps1).
      #
      # No -Version override: package version comes from the single-sourced
      # VersionPrefix/VersionSuffix in the root Directory.Build.props, independent of the
      # git tag that triggered this workflow (see FalkForge.Templates' single-source
      # version pinning, enforced by TemplatePackTests).
      #
      # No symbol packages (.snupkg) are produced today (no IncludeSymbols/
      # SymbolPackageFormat in any packable csproj) — if that changes, `dotnet nuget push`
      # auto-detects and pushes a sibling .snupkg for every .nupkg it uploads with no
      # workflow change required.
      - name: Pack NuGet packages
        shell: pwsh
        run: ./scripts/pack.ps1

      - name: NuGet login (OIDC -> temp API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to nuget.org
        shell: pwsh
        run: >
          dotnet nuget push artifacts/nuget/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicates
