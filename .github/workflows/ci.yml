name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# upload-artifact@v5 still declares a Node 20 runtime; opt all JavaScript
# actions into Node 24 ahead of the 2026-06-16 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FalkForge.slnx

      - name: Build
        run: dotnet build FalkForge.slnx --no-restore -c Release

      # Provision darice.cub so ICE validation runs in CI.
      # WiX Toolset 3.x ships darice.cub at a known path and installs in ~30s via
      # Chocolatey. If the install fails the test step still passes because
      # MsiCompiler uses SkipWhenCubUnavailable=true by default — but ICE tests
      # that require a cub will skip rather than providing coverage.
      # The probe step below reports exactly what was found so failures are visible.
      - name: Install WiX Toolset (for darice.cub)
        shell: pwsh
        run: |
          $output = choco install wixtoolset -y --no-progress 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::WiX Toolset install failed — ICE validation will not run in this job."
            Write-Host ($output | Select-Object -Last 15 | Out-String)
          }
          # This step is advisory: ICE coverage is desirable but its absence is
          # handled (probe step reports it; tests use SkipWhenCubUnavailable).
          # A lingering non-zero $LASTEXITCODE from choco must not fail the job.
          exit 0

      - name: Probe darice.cub availability
        shell: pwsh
        run: |
          $searchPaths = @(
            "C:\Program Files (x86)\WiX Toolset v3.14",
            "C:\Program Files (x86)\WiX Toolset v3.11",
            "C:\Program Files (x86)\Windows Kits\10\bin",
            "C:\Program Files\Windows Kits\10\bin"
          )
          $found = $null
          foreach ($base in $searchPaths) {
            if (Test-Path $base) {
              $cub = Get-ChildItem -Path $base -Filter "darice.cub" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($cub) { $found = $cub.FullName; break }
            }
          }
          if ($found) {
            Write-Host "darice.cub found: $found"
            Write-Host "ICE validation is ACTIVE for this CI run."
          } else {
            Write-Host "::warning::darice.cub not found on this runner. ICE tests will skip. " +
              "To enable ICE coverage, ensure the Windows SDK or WiX Toolset 3.x is installed."
          }

      - name: Test
        run: dotnet test FalkForge.slnx --no-build -c Release -v minimal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: |
            TestResults/**
            tests/**/bin/**/TestResults/**
          if-no-files-found: warn

  code-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build FalkForge.slnx -c Release

      - name: Install Roslynator
        run: dotnet tool install -g roslynator.dotnet.cli

      - name: Run Roslynator
        shell: pwsh
        run: |
          $projects = @(
            "src/FalkForge.Core/FalkForge.Core.csproj",
            "src/FalkForge.Compiler.Msi/FalkForge.Compiler.Msi.csproj",
            "src/FalkForge.Compiler.Bundle/FalkForge.Compiler.Bundle.csproj",
            "src/FalkForge.Engine/FalkForge.Engine.csproj",
            "src/FalkForge.Engine.Protocol/FalkForge.Engine.Protocol.csproj",
            "src/FalkForge.Engine.Elevation/FalkForge.Engine.Elevation.csproj",
            "src/FalkForge.Ui/FalkForge.Ui.csproj",
            "src/FalkForge.Cli/FalkForge.Cli.csproj",
            "src/FalkForge.Decompiler/FalkForge.Decompiler.csproj",
            "src/FalkForge.Platform/FalkForge.Platform.csproj",
            "src/FalkForge.Platform.Windows/FalkForge.Platform.Windows.csproj",
            "src/FalkForge.Localization/FalkForge.Localization.csproj"
          )
          $failed = $false
          foreach ($proj in $projects) {
            Write-Host "Analyzing $proj..."
            $result = roslynator analyze $proj --severity-level warning --ignore-compiler-diagnostics -v minimal 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Roslynator found issues in $proj"
              Write-Host $result
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
