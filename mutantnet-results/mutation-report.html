<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MutantNet — Mutation Report</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #21253a;
    --border: #2a2d3a;
    --border-2: #363a4f;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #475569;

    --killed: #22c55e;
    --killed-bg: rgba(34,197,94,0.10);
    --killed-border: rgba(34,197,94,0.25);
    --survived: #ef4444;
    --survived-bg: rgba(239,68,68,0.10);
    --survived-border: rgba(239,68,68,0.25);
    --nocov: #f59e0b;
    --nocov-bg: rgba(245,158,11,0.10);
    --nocov-border: rgba(245,158,11,0.25);
    --timeout: #f97316;
    --timeout-bg: rgba(249,115,22,0.10);
    --timeout-border: rgba(249,115,22,0.25);
    --equivalent: #64748b;
    --equivalent-bg: rgba(100,116,139,0.10);
    --equivalent-border: rgba(100,116,139,0.25);
    --compileerror: #a855f7;
    --compileerror-bg: rgba(168,85,247,0.10);
    --compileerror-border: rgba(168,85,247,0.25);

    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, 'Courier New', monospace;
    --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;

    --header-h: 280px;
    --radius: 8px;
    --radius-sm: 4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    backdrop-filter: blur(8px);
  }

  #header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: start;
  }

  /* Gauge */
  #gauge-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    flex-shrink: 0;
  }
  #gauge-svg { width: 140px; height: 140px; transform: rotate(-225deg); }
  #gauge-track { fill: none; stroke: var(--border-2); stroke-width: 10; stroke-linecap: round; }
  #gauge-arc {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 0 1000;
    transition: stroke-dasharray 1.2s cubic-bezier(.4,0,.2,1), stroke 0.4s;
  }
  #gauge-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
  }
  #gauge-pct {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -1px;
  }
  #gauge-sub {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Right panel */
  #header-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  /* Stat cards */
  #stat-cards {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 90px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 80px;
    max-width: 140px;
  }
  .stat-card-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }
  .stat-card-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-card.killed { border-color: var(--killed-border); }
  .stat-card.killed .stat-card-value { color: var(--killed); }
  .stat-card.survived { border-color: var(--survived-border); }
  .stat-card.survived .stat-card-value { color: var(--survived); }
  .stat-card.nocov { border-color: var(--nocov-border); }
  .stat-card.nocov .stat-card-value { color: var(--nocov); }
  .stat-card.timeout { border-color: var(--timeout-border); }
  .stat-card.timeout .stat-card-value { color: var(--timeout); }
  .stat-card.equivalent { border-color: var(--equivalent-border); }
  .stat-card.equivalent .stat-card-value { color: var(--equivalent); }

  /* Proportion bar */
  #prop-bar {
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--border);
    display: flex;
  }
  .prop-seg {
    height: 100%;
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  /* Meta */
  #header-meta {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .meta-item svg { opacity: 0.5; }

  /* ── MAIN ── */
  #main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* Section titles */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FILE LIST TABLE ── */
  #file-list-section {}

  #filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid var(--border-2);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--border-2); background: var(--surface); color: var(--text); }
  .filter-btn.active { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
  .filter-btn.survived.active { border-color: var(--survived-border); color: var(--survived); background: var(--survived-bg); }
  .filter-btn.nocov.active { border-color: var(--nocov-border); color: var(--nocov); background: var(--nocov-bg); }
  .filter-btn.killed.active { border-color: var(--killed-border); color: var(--killed); background: var(--killed-bg); }

  #file-table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  #file-table {
    width: 100%;
    border-collapse: collapse;
  }
  #file-table th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.15s;
  }
  #file-table th:hover { color: var(--text); }
  #file-table th.sort-asc::after { content: ' ↑'; }
  #file-table th.sort-desc::after { content: ' ↓'; }
  #file-table td {
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  #file-table tr:last-child td { border-bottom: none; }
  #file-table tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }
  #file-table tbody tr:hover { background: var(--surface-2); }

  .file-name-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-dir {
    color: var(--text-dim);
    font-size: 11px;
  }
  .mini-bar-wrap {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--killed);
    transition: width 0.8s;
  }
  .count-cell {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-align: right;
  }
  .count-cell.killed { color: var(--killed); }
  .count-cell.survived { color: var(--survived); }
  .count-cell.nocov { color: var(--nocov); }

  /* ── FILE VIEWS ── */
  #file-views {}

  .file-view {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .file-view + .file-view { margin-top: 20px; }

  .file-view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .file-view-header:hover { background: var(--surface-2); }
  .file-view-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-view-badges {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .fv-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 100px;
    letter-spacing: 0.3px;
  }
  .fv-badge.killed { background: var(--killed-bg); color: var(--killed); border: 1px solid var(--killed-border); }
  .fv-badge.survived { background: var(--survived-bg); color: var(--survived); border: 1px solid var(--survived-border); }
  .fv-badge.nocov { background: var(--nocov-bg); color: var(--nocov); border: 1px solid var(--nocov-border); }
  .file-view-chevron {
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .file-view.collapsed .file-view-chevron { transform: rotate(-90deg); }

  .file-view-body {
    overflow: hidden;
    max-height: 10000px;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
  }
  .file-view.collapsed .file-view-body { max-height: 0; }

  /* Code view */
  .code-table { width: 100%; border-collapse: collapse; }
  .code-line { display: contents; }
  .line-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 12px 0 16px;
    text-align: right;
    user-select: none;
    vertical-align: top;
    width: 52px;
    white-space: nowrap;
    line-height: 20px;
  }
  .line-gutter {
    width: 4px;
    padding: 0;
    vertical-align: top;
  }
  .line-gutter-inner {
    width: 4px;
    height: 100%;
    min-height: 20px;
  }
  .line-gutter-inner.survived { background: var(--survived); }
  .line-gutter-inner.killed { background: var(--killed); }
  .line-gutter-inner.nocov { background: var(--nocov); }
  .line-gutter-inner.mixed { background: linear-gradient(var(--survived) 50%, var(--nocov) 50%); }

  .line-code {
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 16px 0 12px;
    white-space: pre;
    overflow: hidden;
    vertical-align: top;
    line-height: 20px;
    width: 100%;
  }
  tr.code-row { cursor: default; }
  tr.code-row.mutated { cursor: pointer; }
  tr.code-row.mutated:hover .line-code { background: rgba(255,255,255,0.03); }
  tr.code-row.mutated:hover .line-num { color: var(--text-muted); }
  tr.code-row.active { background: rgba(255,255,255,0.02); }

  /* Mutant panel */
  tr.mutant-panel-row td {
    padding: 0;
    border-top: 1px solid var(--border);
  }
  .mutant-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
  }
  .mutant-panel.open { max-height: 2000px; }
  .mutant-panel-inner {
    padding: 12px 16px 12px 56px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(0,0,0,0.25);
  }

  /* Diff card */
  .diff-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    font-family: var(--mono);
    font-size: 11px;
  }
  .diff-card.survived-card { border-color: var(--survived); box-shadow: 0 0 0 1px rgba(239,68,68,0.15); }

  .diff-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .diff-operator {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
    flex: 1;
  }
  .diff-status { flex-shrink: 0; }
  .diff-meta {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
    margin-left: auto;
    display: flex;
    gap: 10px;
  }
  .diff-meta span { display: flex; align-items: center; gap: 3px; }

  .diff-body { display: grid; grid-template-columns: 1fr 1fr; }
  .diff-side {
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .diff-side-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    opacity: 0.6;
  }
  .diff-side.original { background: rgba(239,68,68,0.08); border-right: 1px solid var(--border); }
  .diff-side.original .diff-side-label { color: var(--survived); }
  .diff-side.mutated { background: rgba(34,197,94,0.08); }
  .diff-side.mutated .diff-side-label { color: var(--killed); }
  .diff-code {
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
    font-size: 11px;
  }
  .diff-side.original .diff-code { color: #fca5a5; }
  .diff-side.mutated .diff-code { color: #86efac; }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge.killed { background: var(--killed-bg); color: var(--killed); border: 1px solid var(--killed-border); }
  .badge.survived { background: var(--survived-bg); color: var(--survived); border: 1px solid var(--survived-border); }
  .badge.noCoverage { background: var(--nocov-bg); color: var(--nocov); border: 1px solid var(--nocov-border); }
  .badge.timeout { background: var(--timeout-bg); color: var(--timeout); border: 1px solid var(--timeout-border); }
  .badge.equivalent { background: var(--equivalent-bg); color: var(--equivalent); border: 1px solid var(--equivalent-border); }
  .badge.compileError { background: var(--compileerror-bg); color: var(--compileerror); border: 1px solid var(--compileerror-border); }
  .badge.pending { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* C# syntax */
  .cs-keyword { color: #7dd3fc; }
  .cs-type { color: #c084fc; }
  .cs-string { color: #fbbf24; }
  .cs-comment { color: #4b5563; font-style: italic; }
  .cs-number { color: #fb923c; }
  .cs-operator { color: #94a3b8; }

  /* Empty state */
  #empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  #empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
  #empty-state p { font-size: 12px; }

  /* No data state */
  #no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--mono);
    flex-direction: column;
    gap: 8px;
  }
  #no-data h1 { font-size: 16px; font-weight: 500; color: var(--text); }
  #no-data p { font-size: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Subtle grid bg on header */
  #header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }
  #header { position: sticky; top: 0; z-index: 100; }
</style>

<script>
(function() {
  'use strict';

  const D = window.__REPORT_DATA__;

  const app = document.getElementById('app');

  if (!D) {
    app.innerHTML = `<div id="no-data">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      <h1>No report data available</h1>
      <p>This template requires <code>window.__REPORT_DATA__</code> to be defined.</p>
    </div>`;
    return;
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function basename(p) {
    return p.replace(/\\/g,'/').split('/').pop() || p;
  }

  function dirname(p) {
    const parts = p.replace(/\\/g,'/').split('/');
    parts.pop();
    return parts.join('/') || '.';
  }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        year:'numeric', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    } catch { return iso; }
  }

  function fmtMs(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    return (ms/1000).toFixed(1) + 's';
  }

  function gaugeColor(score) {
    if (score >= 80) return 'var(--killed)';
    if (score >= 50) return 'var(--nocov)';
    return 'var(--survived)';
  }

  function statusLabel(s) {
    const m = {killed:'Killed', survived:'Survived', noCoverage:'No Cov', timeout:'Timeout', equivalent:'Equiv', compileError:'Compile Err', pending:'Pending'};
    return m[s] || s;
  }

  // ── C# syntax highlight ──────────────────────────────────────────────────
  const KEYWORDS = ['abstract','as','base','bool','break','byte','case','catch','char','checked','class','const','continue','decimal','default','delegate','do','double','else','enum','event','explicit','extern','false','finally','fixed','float','for','foreach','goto','if','implicit','in','int','interface','internal','is','lock','long','namespace','new','null','object','operator','out','override','params','private','protected','public','readonly','ref','return','sbyte','sealed','short','sizeof','stackalloc','static','string','struct','switch','this','throw','true','try','typeof','uint','ulong','unchecked','unsafe','ushort','using','virtual','void','volatile','while','async','await','var','get','set','value','partial','record','init','with','and','or','not','nint','nuint','dynamic','global','where','select','from','join','group','into','by','on','equals','let','orderby','ascending','descending','nameof','when','_'];

  function highlightCS(code) {
    let s = esc(code);
    s = s.replace(/(\/\/[^\n]*)/g, '<span class="cs-comment">$1</span>');
    s = s.replace(/(&quot;(?:[^&]|&(?!quot;))*&quot;)/g, '<span class="cs-string">$1</span>');
    s = s.replace(/\b(\d+(?:\.\d+)?[fFdDmMuUlL]*)\b/g, '<span class="cs-number">$1</span>');
    const kw = new RegExp(`\\b(${KEYWORDS.join('|')})\\b`, 'g');
    // Apply keywords only to text nodes outside existing spans
    s = s.replace(/>([^<]*)</g, (match, text) => '>' + text.replace(kw, (m, k) => `<span class="cs-keyword">${k}</span>`) + '<');
    // Also handle text at the start/end not wrapped in tags
    s = s.replace(/^([^<]+)/, (match, text) => text.replace(kw, (m, k) => `<span class="cs-keyword">${k}</span>`));
    return s;
  }

  // ── Build file stats ─────────────────────────────────────────────────────
  const mutants = D.mutants || [];
  const total = D.totalMutants || mutants.length;

  // Group mutants by file
  const fileMap = {}; // filePath -> { killed, survived, noCoverage, all[] }
  for (const m of mutants) {
    if (!fileMap[m.filePath]) fileMap[m.filePath] = { killed:0, survived:0, noCoverage:0, all:[] };
    const f = fileMap[m.filePath];
    f.all.push(m);
    if (m.status === 'killed') f.killed++;
    else if (m.status === 'survived') f.survived++;
    else if (m.status === 'noCoverage') f.noCoverage++;
  }

  const fileStats = Object.entries(fileMap).map(([path, s]) => ({
    path,
    killed: s.killed,
    survived: s.survived,
    noCoverage: s.noCoverage,
    total: s.all.length,
    score: (() => { const covered = s.all.filter(m => m.status !== 'noCoverage' && m.status !== 'equivalent').length; return covered ? Math.round(s.killed / covered * 100) : 0; })(),
    mutants: s.all
  }));

  // Sort state
  let sortCol = 'survived';
  let sortDir = -1; // -1 = desc
  let filterStatus = 'all';

  // ── Render header ────────────────────────────────────────────────────────
  function renderHeader() {
    const score = D.score ?? 0;
    const color = gaugeColor(score);
    // Arc: 270deg arc, stroke-dasharray based on circumference
    // r=52, circumference of full circle = 2*PI*52 ≈ 326.7
    // We use 270/360 = 75% of circumference for the track arc
    const R = 52, CX = 70, CY = 70;
    const circ = 2 * Math.PI * R;
    const arcLen = circ * 0.75; // 270deg
    const filledLen = arcLen * (score / 100);

    const props = [
      { key: 'killed', color: 'var(--killed)', count: D.killed || 0 },
      { key: 'survived', color: 'var(--survived)', count: D.survived || 0 },
      { key: 'noCoverage', color: 'var(--nocov)', count: D.noCoverage || 0 },
      { key: 'timeout', color: 'var(--timeout)', count: D.timeout || 0 },
      { key: 'equivalent', color: 'var(--equivalent)', count: D.equivalent || 0 },
    ];
    const propBar = props.map(p => {
      const pct = total ? (p.count / total * 100) : 0;
      return `<div class="prop-seg" style="width:${pct}%;background:${p.color}" title="${p.key}: ${p.count}"></div>`;
    }).join('');

    return `
    <div id="header">
      <div id="header-inner">
        <div id="gauge-wrap">
          <svg id="gauge-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
            <circle id="gauge-track" cx="${CX}" cy="${CY}" r="${R}"
              stroke-dasharray="${arcLen} ${circ - arcLen}"
              stroke-dashoffset="0"/>
            <circle id="gauge-arc" cx="${CX}" cy="${CY}" r="${R}"
              stroke="${color}"
              stroke-dasharray="0 ${circ}"
              stroke-dashoffset="0"
              data-filled="${filledLen}"
              data-circ="${circ}"/>
          </svg>
          <div id="gauge-label">
            <span id="gauge-pct" style="color:${color}">${score}%</span>
            <span id="gauge-sub">mutation<br>score</span>
          </div>
        </div>
        <div id="header-right">
          <div id="stat-cards">
            <div class="stat-card killed">
              <span class="stat-card-label">Killed</span>
              <span class="stat-card-value">${D.killed ?? 0}</span>
            </div>
            <div class="stat-card survived">
              <span class="stat-card-label">Survived</span>
              <span class="stat-card-value">${D.survived ?? 0}</span>
            </div>
            <div class="stat-card nocov">
              <span class="stat-card-label">No Coverage</span>
              <span class="stat-card-value">${D.noCoverage ?? 0}</span>
            </div>
            <div class="stat-card timeout">
              <span class="stat-card-label">Timeout</span>
              <span class="stat-card-value">${D.timeout ?? 0}</span>
            </div>
            <div class="stat-card equivalent">
              <span class="stat-card-label">Equivalent</span>
              <span class="stat-card-value">${D.equivalent ?? 0}</span>
            </div>
          </div>
          <div id="prop-bar">${propBar}</div>
          <div id="header-meta">
            <span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
              ${esc(D.projectPath || '—')}
            </span>
            <span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              ${fmtDate(D.generatedAt || '')}
            </span>
            <span class="meta-item">${total} mutants · ${fileStats.length} files</span>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ── Render file table ────────────────────────────────────────────────────
  function getSortedFiltered() {
    let rows = [...fileStats];

    if (filterStatus === 'survived') rows = rows.filter(f => f.survived > 0);
    else if (filterStatus === 'nocov') rows = rows.filter(f => f.noCoverage > 0);
    else if (filterStatus === 'killed') rows = rows.filter(f => f.killed > 0);

    rows.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
      return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
    });
    return rows;
  }

  function thClass(col) {
    if (sortCol !== col) return '';
    return sortDir === 1 ? 'sort-asc' : 'sort-desc';
  }

  function renderFileTable() {
    const rows = getSortedFiltered();

    const thead = `<thead><tr>
      <th data-sort="path" class="${thClass('path')}">File</th>
      <th data-sort="score" class="${thClass('score')}" style="width:100px">Score</th>
      <th data-sort="killed" class="${thClass('killed')}" style="width:70px;text-align:right">Killed</th>
      <th data-sort="survived" class="${thClass('survived')}" style="width:80px;text-align:right">Survived</th>
      <th data-sort="noCoverage" class="${thClass('noCoverage')}" style="width:90px;text-align:right">No Cov</th>
    </tr></thead>`;

    let tbody = '<tbody>';
    if (rows.length === 0) {
      tbody += `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-dim);font-family:var(--mono);font-size:12px">No files match the current filter</td></tr>`;
    } else {
      for (const f of rows) {
        const base = basename(f.path);
        const dir = dirname(f.path);
        tbody += `<tr data-file="${esc(f.path)}" class="file-row">
          <td>
            <div class="file-name-cell">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><path d="M13 2v7h7"/></svg>
              <span>${esc(base)}</span><span class="file-dir">${esc(dir)}</span>
            </div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${f.score}%"></div></div>
              <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim);width:28px">${f.score}%</span>
            </div>
          </td>
          <td class="count-cell killed">${f.killed}</td>
          <td class="count-cell survived">${f.survived}</td>
          <td class="count-cell nocov">${f.noCoverage}</td>
        </tr>`;
      }
    }
    tbody += '</tbody>';

    return `
    <section id="file-list-section">
      <div class="section-title">Files</div>
      <div id="filter-bar">
        <button class="filter-btn ${filterStatus==='all'?'active':''}" data-filter="all">All (${fileStats.length})</button>
        <button class="filter-btn survived ${filterStatus==='survived'?'active':''}" data-filter="survived">Survived</button>
        <button class="filter-btn nocov ${filterStatus==='nocov'?'active':''}" data-filter="nocov">No Coverage</button>
        <button class="filter-btn killed ${filterStatus==='killed'?'active':''}" data-filter="killed">Killed</button>
      </div>
      <div id="file-table-wrap">
        <table id="file-table">${thead}${tbody}</table>
      </div>
    </section>`;
  }

  // ── Render file views ────────────────────────────────────────────────────
  function buildLineMap(fileMutants) {
    // line -> mutant[]
    const map = {};
    for (const m of fileMutants) {
      if (!map[m.line]) map[m.line] = [];
      map[m.line].push(m);
    }
    return map;
  }

  function lineGutterClass(mutants) {
    const hasSurvived = mutants.some(m => m.status === 'survived');
    const hasNoCov = mutants.some(m => m.status === 'noCoverage');
    const hasKilled = mutants.some(m => m.status === 'killed');
    if (hasSurvived && (hasNoCov || hasKilled)) return 'mixed';
    if (hasSurvived) return 'survived';
    if (hasNoCov) return 'nocov';
    if (hasKilled) return 'killed';
    return '';
  }

  function renderDiffCard(m) {
    const isSurvived = m.status === 'survived';
    return `<div class="diff-card ${isSurvived ? 'survived-card' : ''}">
      <div class="diff-card-header">
        <span class="diff-operator">${esc(m.operatorName)}</span>
        <span class="diff-status"><span class="badge ${m.status}">${statusLabel(m.status)}</span></span>
        <span class="diff-meta">
          <span>${fmtMs(m.durationMs)}</span>
          ${m.killedByTest ? `<span title="${esc(m.killedByTest)}">🗸 ${esc(m.killedByTest.split('.').pop())}</span>` : ''}
        </span>
      </div>
      <div class="diff-body">
        <div class="diff-side original">
          <div class="diff-side-label">Original</div>
          <pre class="diff-code">${esc(m.originalCode)}</pre>
        </div>
        <div class="diff-side mutated">
          <div class="diff-side-label">Mutated</div>
          <pre class="diff-code">${esc(m.mutatedCode)}</pre>
        </div>
      </div>
    </div>`;
  }

  function renderFileView(f) {
    const src = (D.files && D.files[f.path]) || '';
    const lines = src.split('\n');
    const lineMap = buildLineMap(f.mutants);

    const killed = f.killed, survived = f.survived, noCov = f.noCoverage;

    let tableRows = '';
    for (let i = 0; i < lines.length; i++) {
      const lineNum = i + 1;
      const lineMuts = lineMap[lineNum];
      const isMutated = !!lineMuts;
      const gutterCls = isMutated ? lineGutterClass(lineMuts) : '';
      const rowCls = isMutated ? 'code-row mutated' : 'code-row';

      tableRows += `<tr class="${rowCls}" data-line="${lineNum}" data-file="${esc(f.path)}">
        <td class="line-num">${lineNum}</td>
        <td class="line-gutter"><div class="line-gutter-inner ${gutterCls}"></div></td>
        <td class="line-code">${highlightCS(lines[i])}</td>
      </tr>`;

      if (isMutated) {
        const cards = lineMuts.map(renderDiffCard).join('');
        tableRows += `<tr class="mutant-panel-row" data-panel-for="${f.path}|${lineNum}">
          <td colspan="3">
            <div class="mutant-panel" id="panel-${esc(f.path.replace(/[^a-z0-9]/gi,'-'))}-${lineNum}">
              <div class="mutant-panel-inner">${cards}</div>
            </div>
          </td>
        </tr>`;
      }
    }

    // If no source, just list mutants
    if (!src && f.mutants.length > 0) {
      tableRows = f.mutants.map(m =>
        `<tr><td colspan="3" style="padding:4px 16px">${renderDiffCard(m)}</td></tr>`
      ).join('');
    }

    const fileId = 'fv-' + f.path.replace(/[^a-z0-9]/gi,'-');

    return `<div class="file-view" id="${esc(fileId)}">
      <div class="file-view-header" data-fv="${esc(f.path)}">
        <span class="file-view-path">${esc(f.path)}</span>
        <div class="file-view-badges">
          ${killed ? `<span class="fv-badge killed">${killed} killed</span>` : ''}
          ${survived ? `<span class="fv-badge survived">${survived} survived</span>` : ''}
          ${noCov ? `<span class="fv-badge nocov">${noCov} no cov</span>` : ''}
        </div>
        <svg class="file-view-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="file-view-body">
        <table class="code-table"><tbody>${tableRows}</tbody></table>
      </div>
    </div>`;
  }

  function renderFileViews() {
    if (fileStats.length === 0) {
      return `<section id="file-views">
        <div class="section-title">Source Files</div>
        <div id="empty-state"><h2>No mutation data</h2><p>No mutants were generated for this run.</p></div>
      </section>`;
    }

    const views = fileStats.map(f => renderFileView(f)).join('');
    return `<section id="file-views">
      <div class="section-title">Source Files</div>
      ${views}
    </section>`;
  }

  // ── Initial render ───────────────────────────────────────────────────────
  function render() {
    app.innerHTML = `
      ${renderHeader()}
      <div id="main">
        ${renderFileTable()}
        ${renderFileViews()}
      </div>`;

    bindEvents();
    animateGauge();
  }

  // ── Events ───────────────────────────────────────────────────────────────
  function bindEvents() {
    // Table sort
    document.querySelectorAll('#file-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = col === 'path' ? 1 : -1; }
        rerenderTable();
      });
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterStatus = btn.dataset.filter;
        rerenderTable();
      });
    });

    // File table row click -> scroll & expand file view
    document.addEventListener('click', e => {
      const row = e.target.closest('.file-row');
      if (row) {
        const path = row.dataset.file;
        const fileId = 'fv-' + path.replace(/[^a-z0-9]/gi,'-');
        const el = document.getElementById(fileId);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          el.classList.remove('collapsed');
        }
        return;
      }

      // File view header toggle
      const fvh = e.target.closest('.file-view-header');
      if (fvh) {
        const fv = fvh.closest('.file-view');
        if (fv) fv.classList.toggle('collapsed');
        return;
      }

      // Mutated line click
      const lineRow = e.target.closest('tr.code-row.mutated');
      if (lineRow) {
        const lineNum = lineRow.dataset.line;
        const filePath = lineRow.dataset.file;
        const panelId = 'panel-' + filePath.replace(/[^a-z0-9]/gi,'-') + '-' + lineNum;
        const panel = document.getElementById(panelId);
        if (panel) {
          panel.classList.toggle('open');
          lineRow.classList.toggle('active');
        }
      }
    });
  }

  function rerenderTable() {
    const section = document.getElementById('file-list-section');
    if (section) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderFileTable();
      section.replaceWith(tmp.firstElementChild);
    }
    // Re-bind sort/filter
    document.querySelectorAll('#file-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = col === 'path' ? 1 : -1; }
        rerenderTable();
      });
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterStatus = btn.dataset.filter;
        rerenderTable();
      });
    });
  }

  // ── Gauge animation ──────────────────────────────────────────────────────
  function animateGauge() {
    const arc = document.getElementById('gauge-arc');
    if (!arc) return;
    const filled = parseFloat(arc.dataset.filled);
    const circ = parseFloat(arc.dataset.circ);
    requestAnimationFrame(() => {
      arc.style.strokeDasharray = `${filled} ${circ - filled}`;
    });
  }

  render();
})();
</script>

</body>
</html>
